# XGBoost ML Pipeline Configuration - Linear Version
# 3.16 第一次训练
# Usage: python train.py --config config/config_3.16_first.yaml --optimize

# Project paths
paths:
  data_dir: "data"
  logs_dir: "logs"
  output_dir: "output/3.16_第一次训练结果"
  raw_data: "D:/AI_study/shujukuzhuanhua/training_data.csv"
  processed_data: "data/processed_data_3.16_first.csv"
  model_file: "output/3.16_第一次训练结果/xgboost_model.pkl"
  optuna_db: "logs/optuna_study_3.16_first.db"
  best_params: "logs/best_params_3.16_first.json"

# Target column
target:
  name: "Nexp/kN"
  description: "Ultimate bearing capacity of CFDST column"

# Columns to drop (dimensional parameters to exclude)
# Model should be based on dimensionless parameters
drop_columns:
  - "b"
  - "h"
  - "r0"
  - "t"
  - "Unnamed: 22"
  # Add any other dimensional columns to exclude

# Data preprocessing settings
preprocessing:
  imputation_strategy: "median"  # Options: median, mean, most_frequent
  scale_features: false  # XGBoost is robust to feature scaling
  test_size: 0.2
  random_state: 42
  log_transform_target: false  # Disable log transform (use original scale)
  log_transform_epsilon: 1.0  # Not used when log_transform_target is false

# Model settings
model:
  name: "XGBoostRegressor"
  save_format: "pkl"

# Optuna hyperparameter optimization settings
optuna:
  use_optuna: true  # If false, use preset xgboost_params or load from best_params.json
  n_trials: 300
  timeout: 3600  # seconds
  n_jobs: -1  # Use all available cores
  study_name: "cfdst_xgboost_optimization_linear"
  direction: "minimize"  # Minimize RMSE

# Preset XGBoost parameters (used when use_optuna: false and no best_params.json exists)
xgboost_params:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 1
  gamma: 0
  reg_alpha: 0
  reg_lambda: 1
  objective: "reg:squarederror"
  random_state: 42
  n_jobs: -1

# Cross-validation settings
cross_validation:
  n_splits: 5
  shuffle: true
  random_state: 42

# Optuna search space for hyperparameters
optuna_search_space:
  n_estimators:
    low: 100
    high: 1000
    step: 50
  max_depth:
    low: 3
    high: 12
  learning_rate:
    low: 0.01
    high: 0.3
    log: true
  subsample:
    low: 0.6
    high: 1.0
  colsample_bytree:
    low: 0.6
    high: 1.0
  min_child_weight:
    low: 1
    high: 10
  gamma:
    low: 0.0
    high: 0.5
  reg_alpha:
    low: 0.001
    high: 1.0
    log: true
  reg_lambda:
    low: 0.1
    high: 10.0
    log: true

# Visualization settings
visualization:
  figsize: [10, 6]
  dpi: 300
  style: "seaborn-v0_8-whitegrid"
  color_palette: "viridis"

# Feature selection settings (RFE)
feature_selection:
  min_features: 3
  step: 1  # Number of features to eliminate at each iteration
  scoring: "neg_root_mean_squared_error"

# Logging settings
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/training.log"
